<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DesignKit</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Display', 'PingFang SC', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
        .card { transition: all 0.2s ease; }
        .copy-btn:active { transform: scale(0.95); }
        .toast { animation: fadeInOut 2s ease forwards; }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(10px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }
        .nav-link.active { color: #000; font-weight: 500; }
        .nav-link { color: #999; transition: color 0.2s; }
        .nav-link:hover { color: #666; }
        .tag { font-size: 11px; padding: 2px 6px; border-radius: 4px; background: #f0f0f0; color: #666; }
    </style>
</head>
<body class="bg-white text-gray-900 antialiased">
    <div id="toast-container" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50"></div>

    <header class="sticky top-0 bg-white/90 backdrop-blur-md border-b border-gray-100 z-40">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <h1 class="text-lg font-semibold tracking-tight">DesignKit</h1>
            <nav id="nav-bar" class="hidden md:flex gap-6 text-sm overflow-x-auto"></nav>
        </div>
        <nav id="nav-bar-mobile" class="md:hidden px-6 pb-3 flex gap-4 text-sm overflow-x-auto"></nav>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-10" id="content"></main>

    <script>
        let data = {};

        async function init() {
            const res = await fetch('claude-data.json');
            data = await res.json();
            renderNav();
            renderContent();
        }

        function renderNav() {
            const navHtml = data.categories.map(cat =>
                `<a href="#${cat.id}" class="nav-link whitespace-nowrap">${cat.icon} ${cat.name}</a>`
            ).join('');
            document.getElementById('nav-bar').innerHTML = navHtml;
            document.getElementById('nav-bar-mobile').innerHTML = navHtml;
        }

        function renderContent() {
            const container = document.getElementById('content');
            container.innerHTML = data.categories.map(cat => {
                if (cat.type === 'specs') return renderSpecs(cat);
                if (cat.type === 'copy') return renderCopy(cat);
                if (cat.subcategories) return renderSubcategories(cat);
                return renderLinkCategory(cat);
            }).join('');
        }

        function renderLinkCategory(cat) {
            return `
                <section id="${cat.id}" class="mb-16">
                    <h2 class="text-xl font-semibold mb-6">${cat.icon} ${cat.name}</h2>
                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                        ${cat.links.map(link => renderCard(link)).join('')}
                    </div>
                </section>
            `;
        }

        function renderSubcategories(cat) {
            return `
                <section id="${cat.id}" class="mb-16">
                    <h2 class="text-xl font-semibold mb-6">${cat.icon} ${cat.name}</h2>
                    ${cat.subcategories.map(sub => `
                        <h3 class="text-sm font-medium text-gray-500 uppercase tracking-wide mt-8 mb-4">${sub.name}</h3>
                        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                            ${sub.links.map(link => renderCard(link)).join('')}
                        </div>
                    `).join('')}
                </section>
            `;
        }

        function renderCard(link) {
            const domain = new URL(link.url).hostname;
            const favicon = `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
            const tags = (link.tags || []).map(t => `<span class="tag">${t}</span>`).join(' ');
            return `
                <a href="${link.url}" target="_blank" rel="noopener"
                   class="card block p-4 rounded-xl border border-gray-100 bg-white hover:border-gray-200">
                    <div class="flex items-start gap-3">
                        <img src="${favicon}" alt="" class="w-8 h-8 rounded-lg flex-shrink-0 mt-0.5"
                             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22><rect width=%2232%22 height=%2232%22 rx=%228%22 fill=%22%23f0f0f0%22/><text x=%2216%22 y=%2220%22 text-anchor=%22middle%22 font-size=%2214%22>${link.title[0]}</text></svg>'">
                        <div class="min-w-0">
                            <div class="font-medium text-sm truncate">${link.title}</div>
                            <div class="text-xs text-gray-400 mt-0.5 truncate">${link.desc}</div>
                            <div class="flex gap-1 mt-2">${tags}</div>
                        </div>
                    </div>
                </a>
            `;
        }

        function renderSpecs(cat) {
            return `
                <section id="${cat.id}" class="mb-16">
                    <h2 class="text-xl font-semibold mb-6">${cat.icon} ${cat.name}</h2>
                    ${cat.items.map(group => `
                        <h3 class="text-sm font-medium text-gray-500 uppercase tracking-wide mt-8 mb-3">${group.group}</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2">
                            ${group.entries.map(e => `
                                <button onclick="copyText('${e.value}')"
                                    class="copy-btn flex items-center justify-between p-3 rounded-lg bg-gray-50 hover:bg-gray-100 transition-colors text-left">
                                    <span class="text-sm text-gray-600">${e.label}</span>
                                    <code class="text-xs font-mono text-gray-900 bg-white px-2 py-0.5 rounded">${e.value}</code>
                                </button>
                            `).join('')}
                        </div>
                    `).join('')}
                </section>
            `;
        }

        function renderCopy(cat) {
            return `
                <section id="${cat.id}" class="mb-16">
                    <h2 class="text-xl font-semibold mb-6">${cat.icon} ${cat.name}</h2>
                    ${cat.items.map(group => `
                        <h3 class="text-sm font-medium text-gray-500 uppercase tracking-wide mt-8 mb-3">${group.group}</h3>
                        <div class="space-y-2">
                            ${group.entries.map(e => `
                                <button onclick="copyText(\`${e.value.replace(/`/g, '\\`')}\`)"
                                    class="copy-btn w-full flex items-center justify-between p-3 rounded-lg bg-gray-50 hover:bg-gray-100 transition-colors text-left group">
                                    <div class="min-w-0 flex-1">
                                        <div class="text-sm font-medium text-gray-700">${e.label}</div>
                                        <div class="text-xs text-gray-400 mt-0.5 truncate">${e.value}</div>
                                    </div>
                                    <span class="text-xs text-gray-300 group-hover:text-gray-500 ml-3 flex-shrink-0">复制</span>
                                </button>
                            `).join('')}
                        </div>
                    `).join('')}
                    <div class="mt-8">
                        <h3 class="text-sm font-medium text-gray-500 uppercase tracking-wide mb-3">最近复制</h3>
                        <div id="copy-history" class="space-y-1 text-sm text-gray-400">暂无记录</div>
                    </div>
                </section>
            `;
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast(`已复制: ${text.length > 30 ? text.slice(0, 30) + '...' : text}`);
                saveCopyHistory(text);
            });
        }

        function showToast(msg) {
            const el = document.createElement('div');
            el.className = 'toast bg-gray-900 text-white text-sm px-4 py-2 rounded-lg shadow-lg';
            el.textContent = msg;
            document.getElementById('toast-container').appendChild(el);
            setTimeout(() => el.remove(), 2000);
        }

        function saveCopyHistory(text) {
            let history = JSON.parse(localStorage.getItem('copyHistory') || '[]');
            history = [{ text, time: Date.now() }, ...history.filter(h => h.text !== text)].slice(0, 10);
            localStorage.setItem('copyHistory', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('copyHistory') || '[]');
            const el = document.getElementById('copy-history');
            if (!el) return;
            if (history.length === 0) { el.innerHTML = '暂无记录'; return; }
            el.innerHTML = history.map(h => `
                <button onclick="copyText(\`${h.text.replace(/`/g, '\\`')}\`)"
                    class="copy-btn w-full text-left p-2 rounded hover:bg-gray-50 transition-colors">
                    <span class="text-xs text-gray-500 truncate block">${h.text.length > 50 ? h.text.slice(0, 50) + '...' : h.text}</span>
                </button>
            `).join('');
        }

        // Scroll spy for nav
        function updateActiveNav() {
            const sections = document.querySelectorAll('section[id]');
            const scrollY = window.scrollY + 100;
            sections.forEach(section => {
                const top = section.offsetTop;
                const height = section.offsetHeight;
                const id = section.getAttribute('id');
                const links = document.querySelectorAll(`a[href="#${id}"]`);
                if (scrollY >= top && scrollY < top + height) {
                    links.forEach(l => l.classList.add('active'));
                } else {
                    links.forEach(l => l.classList.remove('active'));
                }
            });
        }
        window.addEventListener('scroll', updateActiveNav);

        init().then(renderHistory);
    </script>
</body>
</html>
